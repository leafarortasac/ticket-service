server:
  port: 8081

info:
  app:
    description: "API de Gestão de Chamados Multi-tenant com Workflow de Aprovação e Anexos"

spring:
  application:
    name: ticket-service

  main:
    banner-mode: "console"

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ticket_db}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
          time_zone: UTC
        format_sql: true
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_empty
    serialization:
      write-dates-as-timestamps: false

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3
          multiplier: 2.0
        concurrency: 5
        max-concurrency: 10
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3

iam:
  jwt:
    secret: ${JWT_SECRET:M2I3YzA5OGU1YmFhN2U3Zjk0ZWY0ZGIyYmU5ZDBjZjkxZWRhYmFmNjA4MGY1ZDIzM2M4ZGM0ZTI5N2I0YmU3YQ==}
    expiration: 3600000

logging:
  level:
    root: INFO
    com.br.ticket_service: DEBUG
    org.springframework.security: INFO
    org.springframework.amqp: INFO

management:
  endpoints:
    web:
      exposure:
        include: ["health", "info", "prometheus"]